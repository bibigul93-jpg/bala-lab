<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALA LAB — Алем ИИ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#1a2d4f;--green:#3d9e4a;--lime:#7ec84a;--bg:#e8f0e8;--gray:#f0f4f0;--text:#1a2d4f;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:12px;}

.phone{width:370px;height:800px;background:#e8f0e8;border-radius:44px;box-shadow:0 30px 90px rgba(0,0,0,.35),inset 0 0 0 2px rgba(255,255,255,.25);display:flex;flex-direction:column;overflow:hidden;position:relative;}

.hdr{background:var(--navy);padding:12px 14px 10px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.hdr-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--lime));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative;}
.ai-badge{position:absolute;bottom:-2px;right:-2px;background:#ffd700;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;border:1.5px solid var(--navy);}
.hdr-info{flex:1;}
.hdr-name{color:#fff;font-weight:800;font-size:14px;}
.hdr-status{color:var(--lime);font-size:10px;font-weight:600;margin-top:1px;}
.hdr-pts{background:rgba(255,255,255,.12);color:var(--lime);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;cursor:pointer;}

.tabs{display:flex;background:var(--navy);border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.tab{flex:1;padding:7px 4px;text-align:center;color:rgba(255,255,255,.4);font-size:9px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;}
.tab.on{color:var(--lime);border-bottom-color:var(--lime);}

.stats-bar{display:flex;justify-content:space-around;background:var(--navy);padding:7px 0 8px;flex-shrink:0;}
.stat{text-align:center;}
.stat-val{color:var(--lime);font-size:13px;font-weight:800;}
.stat-lbl{color:rgba(255,255,255,.4);font-size:8px;font-weight:700;margin-top:1px;letter-spacing:.3px;}

.chat{flex:1;overflow-y:auto;padding:12px 10px 6px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:0;}
.date-lbl{align-self:center;background:rgba(0,0,0,.08);color:#666;font-size:9px;font-weight:700;padding:2px 10px;border-radius:8px;}

.row{display:flex;gap:5px;align-items:flex-end;animation:pop .25s ease;}
@keyframes pop{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.row.user{flex-direction:row-reverse;}
.av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--navy),#2a4a8a);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.bubble{max-width:252px;padding:8px 12px;border-radius:16px;font-size:12.5px;line-height:1.5;word-break:break-word;}
.row.bot .bubble{background:#fff;color:var(--text);border-radius:16px 16px 16px 3px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.row.user .bubble{background:var(--green);color:#fff;border-radius:16px 16px 3px 16px;}
.bubble .t{font-size:9px;opacity:.45;text-align:right;margin-top:3px;}
.ai-label{font-size:8px;color:var(--lime);font-weight:700;margin-bottom:2px;letter-spacing:.5px;}

.typing{display:flex;gap:3px;padding:8px 12px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:bn 1s infinite;}
.dot:nth-child(2){animation-delay:.15s;}.dot:nth-child(3){animation-delay:.3s;}
@keyframes bn{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

.card{background:var(--gray);border-radius:11px;padding:9px 11px;margin-top:5px;border-left:3px solid var(--green);}
.card-title{font-weight:800;font-size:11px;color:var(--navy);margin-bottom:4px;}
.srow{display:flex;gap:6px;align-items:flex-start;margin-bottom:3px;font-size:11.5px;}
.snum{min-width:18px;height:18px;border-radius:50%;background:var(--navy);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fact-box{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:11px;padding:9px 11px;margin-top:5px;border:1.5px solid var(--lime);font-size:11.5px;line-height:1.55;}
.prog-bar{height:6px;border-radius:3px;background:#e0e0e0;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--lime));transition:width .6s;}

.plant-grid{display:flex;flex-direction:column;gap:6px;margin-top:5px;}
.plant-card{background:#fff;border-radius:13px;padding:10px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;border:2px solid transparent;transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.plant-card:hover{border-color:var(--green);transform:scale(1.02);}
.plant-emoji{font-size:26px;}
.plant-info{flex:1;}.plant-name{font-weight:800;font-size:12px;color:var(--navy);}.plant-sub{font-size:10px;color:#888;margin-top:1px;}
.plant-days{background:var(--gray);color:var(--navy);font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;}

/* QUICK SUGGESTIONS */
.suggestions{padding:4px 8px 4px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;}
.suggestions::-webkit-scrollbar{height:0;}
.sug{background:#fff;border:1.5px solid #ddd;color:#555;font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:14px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.sug:hover{border-color:var(--green);color:var(--green);}

.quick{padding:4px 8px 4px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
.qbtn{background:#fff;border:1.5px solid var(--green);color:var(--navy);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:16px;cursor:pointer;transition:all .15s;}
.qbtn:hover{background:var(--green);color:#fff;}

.inp-row{padding:7px 9px 11px;display:flex;gap:6px;align-items:center;background:#fff;border-top:1px solid #eee;flex-shrink:0;}
.inp{flex:1;background:var(--gray);border:none;border-radius:18px;padding:8px 13px;font-family:'Montserrat',sans-serif;font-size:12.5px;color:var(--text);outline:none;}
.send{width:36px;height:36px;border-radius:50%;background:var(--green);border:none;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.send:hover{background:var(--navy);}
.send.loading{background:#ccc;pointer-events:none;}

/* LEADERBOARD */
.lb-screen{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.lb-hero{background:linear-gradient(135deg,var(--navy),#2a4a8a);padding:16px 14px 20px;text-align:center;}
.lb-hero-title{color:#fff;font-size:15px;font-weight:800;margin-bottom:3px;}
.lb-hero-sub{color:rgba(255,255,255,.55);font-size:10px;}
.lb-podium{display:flex;justify-content:center;align-items:flex-end;gap:8px;margin-top:14px;}
.pod{display:flex;flex-direction:column;align-items:center;gap:3px;}
.pod-av{border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid rgba(255,255,255,.25);}
.pod-av.p1{width:50px;height:50px;border-color:gold;}
.pod-av.p2{width:40px;height:40px;}
.pod-av.p3{width:36px;height:36px;}
.pod-name{color:#fff;font-size:9px;font-weight:700;max-width:58px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.pod-pts{color:var(--lime);font-size:8px;font-weight:700;}
.pod-block{border-radius:5px 5px 0 0;width:42px;display:flex;align-items:center;justify-content:center;}
.pod-block.b1{height:44px;background:gold;color:#fff;font-size:16px;}
.pod-block.b2{height:32px;background:silver;color:#fff;font-size:13px;}
.pod-block.b3{height:24px;background:#cd7f32;color:#fff;font-size:11px;}
.lb-myrank{background:linear-gradient(90deg,#e8f5e9,#f1f8e9);border-radius:12px;margin:10px 12px;padding:10px 13px;display:flex;align-items:center;gap:10px;border:1.5px solid var(--lime);}
.lb-list{padding:8px 12px;display:flex;flex-direction:column;}
.lb-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-size:12px;font-weight:800;color:var(--navy);min-width:20px;text-align:center;}
.lb-rank.me{color:var(--green);}
.lb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.lb-info{flex:1;}
.lb-name{font-weight:700;font-size:11.5px;color:var(--navy);}
.lb-name.me{color:var(--green);}
.lb-meta{font-size:9.5px;color:#aaa;margin-top:1px;}
.lb-pts{font-weight:800;font-size:12px;color:var(--navy);}
.you-badge{background:var(--green);color:#fff;font-size:7px;font-weight:800;padding:1px 4px;border-radius:5px;margin-left:3px;}

/* OVERLAY */
.overlay{position:absolute;inset:0;background:rgba(26,45,79,.72);display:flex;align-items:flex-end;z-index:20;animation:fi .22s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:18px 14px 26px;width:100%;}
.sheet-title{font-weight:800;font-size:14px;color:var(--navy);text-align:center;margin-bottom:12px;}
.name-inp{width:100%;background:var(--gray);border:2px solid var(--green);border-radius:12px;padding:10px 14px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--text);outline:none;margin:8px 0;}
.name-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

.confetti-wrap{position:absolute;inset:0;pointer-events:none;z-index:30;overflow:hidden;}
.cf{position:absolute;top:-10px;width:8px;height:8px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(820px) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="hdr">
    <div class="hdr-av">🌱<div class="ai-badge">✨</div></div>
    <div class="hdr-info">
      <div class="hdr-name">Алем ИИ · BALA LAB</div>
      <div class="hdr-status" id="hdrStatus">✨ ИИ-помощник онлайн</div>
    </div>
    <div class="hdr-pts" id="hdrPts" onclick="switchTab('lb')">⭐ 0</div>
  </div>

  <div class="tabs">
    <div class="tab on" id="tab-chat" onclick="switchTab('chat')">💬 АЛЕМ</div>
    <div class="tab" id="tab-lb" onclick="switchTab('lb')">🏆 ЛИДЕРЫ</div>
    <div class="tab" id="tab-stats" onclick="switchTab('stats')">📊 ДНЕВНИК</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statDay">—</div><div class="stat-lbl">ДЕНЬ</div></div>
    <div class="stat"><div class="stat-val" id="statWater">0</div><div class="stat-lbl">ПОЛИВОВ</div></div>
    <div class="stat"><div class="stat-val" id="statHeight">—</div><div class="stat-lbl">РОСТ</div></div>
    <div class="stat"><div class="stat-val" id="statPts">0</div><div class="stat-lbl">ОЧКОВ</div></div>
  </div>

  <!-- CHAT -->
  <div id="screen-chat" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="chat" id="chat"><div class="date-lbl">Сегодня</div></div>
    <div class="suggestions" id="sugg">
      <button class="sug" onclick="q('Почему мои ростки пожелтели?')">🌿 Почему желтеют?</button>
      <button class="sug" onclick="q('Сколько поливать в день?')">💧 Как поливать?</button>
      <button class="sug" onclick="q('Когда будет урожай?')">🥗 Когда урожай?</button>
      <button class="sug" onclick="q('Расскажи интересный факт')">🔬 Факт дня</button>
      <button class="sug" onclick="q('Что такое фотосинтез?')">🌞 Фотосинтез?</button>
    </div>
    <div class="quick">
      <button class="qbtn" onclick="q('💧 Полить')">💧 Полить</button>
      <button class="qbtn" onclick="q('📏 Записать рост')">📏 Рост</button>
      <button class="qbtn" onclick="q('📒 Дневник')">📒 Дневник</button>
      <button class="qbtn" onclick="q('🏆 Достижения')">🏆 Медали</button>
    </div>
    <div class="inp-row">
      <input class="inp" id="inp" placeholder="Спроси Алема о чём угодно…" onkeydown="if(event.key==='Enter')send()">
      <button class="send" id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="screen-lb" class="lb-screen">
    <div class="lb-hero">
      <div class="lb-hero-title">🏆 Таблица лидеров</div>
      <div class="lb-hero-sub">Кто вырастит больше всех?</div>
      <div class="lb-podium" id="lbPodium"></div>
    </div>
    <div class="lb-myrank" id="lbMyRank" style="display:none"></div>
    <div class="lb-list" id="lbList"></div>
  </div>

  <!-- STATS/DIARY -->
  <div id="screen-stats" style="display:none;flex:1;overflow-y:auto;padding:12px;"></div>

  <div class="confetti-wrap" id="confetti"></div>
</div>

<script>
const SYSTEM_PROMPT = `Ты Алем — дружелюбный ИИ-помощник для детей 6+ из набора BALA LAB Microgreens. 
Ты помогаешь детям выращивать микрозелень (горох, редис, брокколи) дома.
Отвечай коротко, весело, на русском языке. Используй эмодзи. 
Объясняй научные факты простым языком для детей.
Если спрашивают о проблемах с растениями — давай конкретные советы.
Поощряй любопытство и исследования.
Всегда заканчивай ответ вопросом или призывом к действию.
Контекст пользователя: {USER_CONTEXT}`;

const state = {
  name: localStorage.getItem('bl_name')||null,
  plant: localStorage.getItem('bl_plant')||null,
  day: parseInt(localStorage.getItem('bl_day')||'1'),
  waterings: parseInt(localStorage.getItem('bl_water')||'0'),
  wateredToday: false,
  heights: JSON.parse(localStorage.getItem('bl_heights')||'[]'),
  points: parseInt(localStorage.getItem('bl_pts')||'0'),
  achievements: JSON.parse(localStorage.getItem('bl_ach')||'[]'),
  waitingHeight: false,
  history: []
};

const PLANTS = {
  'Горох':    {e:'🟢',sprout:2,harvest:8,  fact:'Горох — быстрая! Витамин С и белок.'},
  'Редис':    {e:'🔴',sprout:2,harvest:7,  fact:'Острый даже в ростках! Богат антиоксидантами.'},
  'Брокколи': {e:'💚',sprout:3,harvest:10, fact:'Содержит сульфорафан — защита от болезней!'},
};

const DEMO_LEADERS = [
  {name:'Арман',    pts:340,plant:'Горох',    av:'🏆',day:6},
  {name:'Дана',     pts:290,plant:'Брокколи', av:'🌿',day:5},
  {name:'Тимур',    pts:255,plant:'Редис',    av:'🔬',day:4},
  {name:'Айгерим', pts:210,plant:'Горох',    av:'🌱',day:4},
  {name:'Нурлан',  pts:185,plant:'Брокколи', av:'🚀',day:3},
  {name:'Алия',    pts:140,plant:'Редис',    av:'⭐',day:2},
];

const ACHIEVEMENTS = [
  {id:'first_water',  name:'Первый полив 💧',           desc:'Полил в первый раз!',              pts:50,  cond:()=>state.waterings>=1},
  {id:'first_measure',name:'Юный измеритель 📏',        desc:'Впервые записал рост.',             pts:50,  cond:()=>state.heights.length>=1},
  {id:'three_days',   name:'3 дня подряд 🌱',           desc:'Поливал 3 дня!',                   pts:75,  cond:()=>state.waterings>=3},
  {id:'ai_chat',      name:'Разговорил ИИ 🤖',          desc:'Задал вопрос Алему!',              pts:30,  cond:()=>state.history.length>=2},
  {id:'top5',         name:'Топ-5 лидеров 🏅',          desc:'Вошёл в пятёрку!',                 pts:100, cond:()=>getMyRank()<=5},
  {id:'week_done',    name:'Неделя исследований 🔬',     desc:'7 дней эксперимента!',             pts:100, cond:()=>state.day>=7},
  {id:'scientist',    name:'Исследователь BALA LAB 🎓', desc:'5+ измерений и поливов!',           pts:150, cond:()=>state.heights.length>=5&&state.waterings>=5},
];

function save(){
  localStorage.setItem('bl_pts',state.points);
  localStorage.setItem('bl_ach',JSON.stringify(state.achievements));
  localStorage.setItem('bl_water',state.waterings);
  localStorage.setItem('bl_heights',JSON.stringify(state.heights));
  localStorage.setItem('bl_day',state.day);
  if(state.name) localStorage.setItem('bl_name',state.name);
  if(state.plant) localStorage.setItem('bl_plant',state.plant);
}
function addPts(n){state.points+=n;save();updateStats();}
function now(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

function getLeaders(){
  let all=[...DEMO_LEADERS];
  if(state.name){
    const idx=all.findIndex(x=>x.name===state.name);
    const me={name:state.name,pts:state.points,plant:state.plant||'—',av:'🌱',day:state.day,isMe:true};
    if(idx>=0) all[idx]=me; else all.push(me);
  }
  return all.sort((a,b)=>b.pts-a.pts);
}
function getMyRank(){
  if(!state.name) return 999;
  return getLeaders().findIndex(x=>x.isMe)+1;
}

function updateStats(){
  document.getElementById('hdrPts').textContent='⭐ '+state.points;
  document.getElementById('statDay').textContent=state.plant?'День '+state.day:'—';
  document.getElementById('statWater').textContent=state.waterings;
  document.getElementById('statHeight').textContent=state.heights.length?state.heights[state.heights.length-1]+'мм':'—';
  document.getElementById('statPts').textContent=state.points;
}

// ── TABS ──────────────────────────────────────────────────
function switchTab(t){
  ['chat','lb','stats'].forEach(x=>{
    document.getElementById('screen-'+x).style.display='none';
    document.getElementById('tab-'+x)?.classList.remove('on');
  });
  document.getElementById('screen-'+t).style.display=(t==='lb'?'flex':'block');
  document.getElementById('tab-'+t)?.classList.add('on');
  if(t==='lb') renderLB();
  if(t==='stats') renderStats();
}

// ── MESSAGES ──────────────────────────────────────────────
function msgUser(text){
  const chat=document.getElementById('chat');
  const r=document.createElement('div');r.className='row user';
  r.innerHTML=`<div class="bubble">${text}<div class="t">${now()}</div></div>`;
  chat.appendChild(r);chat.scrollTop=9999;
}

function msgBot(html,isAI=false){
  const chat=document.getElementById('chat');
  document.getElementById('typing-row')?.remove();
  const r=document.createElement('div');r.className='row bot';
  const label=isAI?'<div class="ai-label">✨ АЛЕМ ИИ</div>':'';
  r.innerHTML=`<div class="av">🌱</div><div class="bubble">${label}${html}<div class="t">${now()}</div></div>`;
  chat.appendChild(r);chat.scrollTop=9999;
}

function showTyping(){
  document.getElementById('typing-row')?.remove();
  const chat=document.getElementById('chat');
  const r=document.createElement('div');r.className='row bot';r.id='typing-row';
  r.innerHTML=`<div class="av">🌱</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(r);chat.scrollTop=9999;
}

// ── AI CALL ───────────────────────────────────────────────
async function askAI(userMsg){
  const btn=document.getElementById('sendBtn');
  btn.classList.add('loading');
  document.getElementById('hdrStatus').textContent='✨ Алем думает…';
  showTyping();

  const ctx=`Имя: ${state.name||'неизвестно'}. Растение: ${state.plant||'не выбрано'}. День: ${state.day}. Поливов: ${state.waterings}. Очков: ${state.points}.`;
  const sysPrompt=SYSTEM_PROMPT.replace('{USER_CONTEXT}',ctx);

  const messages=[
    ...state.history.slice(-6),
    {role:'user', content:userMsg}
  ];

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:400,
        system: sysPrompt,
        messages: messages
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'Упс, что-то пошло не так 😅';

    state.history.push({role:'user',content:userMsg});
    state.history.push({role:'assistant',content:reply});

    document.getElementById('typing-row')?.remove();
    msgBot(reply.replace(/\n/g,'<br>'), true);
    addPts(2);
    checkAchievements();
  } catch(e){
    document.getElementById('typing-row')?.remove();
    msgBot('Упс, ИИ сейчас недоступен 😅 Попробуй ещё раз!', false);
  }

  btn.classList.remove('loading');
  document.getElementById('hdrStatus').textContent='✨ ИИ-помощник онлайн';
}

// ── BUILT-IN COMMANDS ─────────────────────────────────────
function cmdWater(){
  if(!state.plant){msgBot('Сначала выбери растение! Напиши <b>/start</b> 🌱');return;}
  if(state.wateredToday){msgBot(`Уже поливал сегодня! ✅ День ${state.day} из ${PLANTS[state.plant].harvest} 🌅`);return;}
  state.waterings++;state.wateredToday=true;addPts(5);
  checkAchievements();
  msgBot(`<div style="text-align:center;font-size:28px;animation:drip .5s">💧</div>
  <b>Полив записан!</b> День ${state.day}<br>2–3 ст.ложки воды — и не переливай 🚫<br><br>⭐ +5 очков · Рейтинг #${getMyRank()}`);
  updateStats();
}

function cmdMeasure(){
  if(!state.plant){msgBot('Сначала выбери растение! /start 🌱');return;}
  state.waitingHeight=true;
  msgBot('📏 Измерь самый высокий росток<br><br>Напиши высоту в <b>мм</b> (например: <code>15</code>)');
}

function saveMeasure(val){
  const h=parseFloat(val.replace(',','.'));
  if(isNaN(h)||h<0||h>300){msgBot('Введи число от 0 до 300, например: <code>25</code>');return;}
  state.waitingHeight=false;
  const prev=state.heights.length?state.heights[state.heights.length-1]:null;
  state.heights.push(h);addPts(10);save();
  checkAchievements();
  const gr=prev!==null?`<br>📈 Прирост: +${(h-prev).toFixed(1)} мм`:'';
  const c=['Семена в темноте 🌰','Первые ростки! 🌱','Отличный старт ☀️','Бурный рост! 💡','Почти готово! 🥗'][Math.min(Math.floor(h/15),4)];
  msgBot(`✅ <b>Записано!</b> ${h}мм${gr}<br>${c}<br><br>⭐ +10 · Место #${getMyRank()}`);
  updateStats();
}

function cmdDiary(){
  if(!state.plant){msgBot('Начни эксперимент — напиши <b>/start</b> 🌱');return;}
  const p=PLANTS[state.plant];
  const pct=Math.min(Math.round(state.day/p.harvest*100),100);
  const bar='🟩'.repeat(Math.round(pct/10))+'⬜'.repeat(10-Math.round(pct/10));
  const h=state.heights.length?state.heights[state.heights.length-1]:null;
  msgBot(`📒 <b>Дневник исследователя</b><div class="card">
  ${p.e} <b>${state.plant}</b> · День ${state.day} из ${p.harvest}
  ${h?`<br>📏 Рост: <b>${h} мм</b>`:''}
  <br>💧 Поливов: <b>${state.waterings}</b> · ⭐ <b>${state.points}</b>
  <br>🏅 Рейтинг: <b>#${getMyRank()}</b>
  <br><br>${bar} ${pct}%
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>`);
}

function cmdAchievements(){
  let html=`🏆 <b>Достижения</b> · ⭐${state.points}<div class="card">`;
  for(const a of ACHIEVEMENTS){
    const done=state.achievements.includes(a.id);
    html+=`<div style="display:flex;gap:7px;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0f0">
      <div style="font-size:16px">${done?'✅':'🔒'}</div>
      <div><div style="font-weight:700;font-size:11px;color:${done?'var(--navy)':'#ccc'}">${a.name}</div>
      <div style="font-size:9.5px;color:#aaa">${a.desc} · +${a.pts}⭐</div></div></div>`;
  }
  html+='</div>';
  msgBot(html);
}

// ── ACHIEVEMENTS ──────────────────────────────────────────
function checkAchievements(){
  for(const a of ACHIEVEMENTS){
    if(!state.achievements.includes(a.id)&&a.cond()){
      state.achievements.push(a.id);
      addPts(a.pts);save();
      confetti();
      setTimeout(()=>msgBot(`🎉 <b>Новое достижение!</b><br>🏆 ${a.name}<br><i>${a.desc}</i><br>+${a.pts} очков! Место: #${getMyRank()}`),800);
    }
  }
}

// ── PLANT PICKER ──────────────────────────────────────────
function showPlantPicker(){
  const phone=document.getElementById('phone');
  const ov=document.createElement('div');ov.className='overlay';ov.id='plantOv';
  let cards='';
  for(const [n,p] of Object.entries(PLANTS)){
    cards+=`<div class="plant-card" onclick="selectPlant('${n}')">
      <div class="plant-emoji">${p.e}</div>
      <div class="plant-info"><div class="plant-name">${n}</div><div class="plant-sub">Урожай через ${p.harvest} дней</div></div>
      <div class="plant-days">${p.harvest} дн.</div></div>`;
  }
  ov.innerHTML=`<div class="sheet"><div class="sheet-title">🌱 Выбери культуру</div><div class="plant-grid">${cards}</div></div>`;
  phone.appendChild(ov);
}

function selectPlant(name){
  document.getElementById('plantOv')?.remove();
  state.plant=name;save();
  const p=PLANTS[name];
  msgUser(p.e+' '+name);
  setTimeout(()=>{
    msgBot(`${p.e} <b>${name} — старт!</b><div class="card">${p.fact}</div><br>Я готов помочь с выращиванием! Задавай любые вопросы 🔬<br>Ты в таблице лидеров — нажми <b>🏆 ЛИДЕРЫ</b>!`);
    updateStats();setTimeout(()=>checkAchievements(),1000);
  },300);
}

// ── NAME PICKER ───────────────────────────────────────────
function showNamePicker(cb){
  if(state.name){cb();return;}
  const phone=document.getElementById('phone');
  const ov=document.createElement('div');ov.className='overlay';ov.id='nameOv';
  ov.innerHTML=`<div class="sheet">
    <div style="font-size:28px;text-align:center">👋</div>
    <div class="sheet-title">Как тебя зовут?</div>
    <div style="font-size:11px;color:#888;text-align:center">Твоё имя появится в таблице лидеров!</div>
    <input class="name-inp" id="nameInp" placeholder="Например: Арман" maxlength="15" onkeydown="if(event.key==='Enter')confirmName()">
    <button class="name-btn" onclick="confirmName()">Начать! 🌱</button>
  </div>`;
  phone.appendChild(ov);
  setTimeout(()=>document.getElementById('nameInp')?.focus(),100);
  window._nameCb=cb;
}
function confirmName(){
  const v=document.getElementById('nameInp')?.value.trim();
  if(!v||v.length<2){document.getElementById('nameInp').style.borderColor='red';return;}
  state.name=v;save();
  document.getElementById('nameOv')?.remove();
  window._nameCb?.();
}

// ── LEADERBOARD ───────────────────────────────────────────
function renderLB(){
  const leaders=getLeaders();
  const PLANT_E={'Горох':'🟢','Редис':'🔴','Брокколи':'💚','—':'🌱'};

  // Podium
  const p3=leaders.slice(0,3);
  const order=[1,0,2];const sizes=['p2','p1','p3'];const blocks=['b2','b1','b3'];const medals=['🥈','🥇','🥉'];
  document.getElementById('lbPodium').innerHTML=order.map(i=>{
    const p=p3[i];if(!p)return'';
    return`<div class="pod">
      <div class="pod-av ${sizes[i]}">${p.av}</div>
      <div class="pod-name">${p.name}${p.isMe?'<span class="you-badge">ТЫ</span>':''}</div>
      <div class="pod-pts">⭐${p.pts}</div>
      <div class="pod-block ${blocks[i]}">${medals[i]}</div></div>`;
  }).join('');

  // My rank
  const mr=document.getElementById('lbMyRank');
  if(state.name){
    mr.style.display='flex';
    mr.innerHTML=`<div style="font-size:26px">🌱</div>
    <div style="flex:1"><div style="font-size:9px;color:#888">Твоё место</div>
    <div style="font-size:14px;font-weight:800;color:var(--navy)">#${getMyRank()} из ${leaders.length}</div></div>
    <div style="text-align:right"><div style="font-size:9px;color:#888">Очков</div>
    <div style="font-size:14px;font-weight:800;color:var(--green)">⭐${state.points}</div></div>`;
  } else mr.style.display='none';

  // List
  document.getElementById('lbList').innerHTML=leaders.map((p,i)=>{
    const r=i+1;const m=r===1?'🥇':r===2?'🥈':r===3?'🥉':'';
    return`<div class="lb-row">
      <div class="lb-rank ${p.isMe?'me':''}">${m||r}</div>
      <div class="lb-av" style="background:${p.isMe?'#e8f5e9':'#f0f4f0'}">${p.av}</div>
      <div class="lb-info">
        <div class="lb-name ${p.isMe?'me':''}">${p.name}${p.isMe?'<span class="you-badge">ТЫ</span>':''}</div>
        <div class="lb-meta">${PLANT_E[p.plant]||'🌱'} ${p.plant} · День ${p.day}</div></div>
      <div class="lb-pts">⭐${p.pts}</div></div>`;
  }).join('');
}

// ── STATS SCREEN ──────────────────────────────────────────
function renderStats(){
  const pct=state.plant?Math.min(Math.round(state.day/PLANTS[state.plant].harvest*100),100):0;
  const hMax=state.heights.length?Math.max(...state.heights):0;
  const chart=state.heights.slice(-7).map(h=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10.5px">
      <div style="width:28px;color:#888;text-align:right">${h}мм</div>
      <div style="flex:1;height:9px;background:#e0e0e0;border-radius:4px;overflow:hidden">
        <div style="width:${Math.round(h/Math.max(hMax,1)*100)}%;height:100%;background:linear-gradient(90deg,var(--green),var(--lime));border-radius:4px"></div>
      </div></div>`).join('') || '<div style="color:#aaa;font-size:11px">Пока нет данных 📏</div>';

  document.getElementById('screen-stats').innerHTML=`
    <div style="font-weight:800;font-size:14px;color:var(--navy);margin-bottom:10px">📒 Дневник исследователя</div>
    <div class="card" style="margin-bottom:8px">
      <div class="card-title">🌱 Эксперимент</div>
      ${state.plant?`
        <div class="srow"><div class="snum">🌿</div><div>${PLANTS[state.plant].e} ${state.plant}</div></div>
        <div class="srow"><div class="snum">📅</div><div>День ${state.day} из ${PLANTS[state.plant].harvest}</div></div>
        <div class="srow"><div class="snum">💧</div><div>${state.waterings} поливов</div></div>
        <div style="font-size:9px;color:#888;margin-top:3px">Прогресс ${pct}%</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      `:'<div style="color:#aaa;font-size:11px">Напиши /start чтобы начать 🌱</div>'}
    </div>
    <div class="card" style="margin-bottom:8px">
      <div class="card-title">📏 График роста</div>${chart}
    </div>
    <div class="card">
      <div class="card-title">🏆 Достижения ${state.achievements.length}/${ACHIEVEMENTS.length}</div>
      ${ACHIEVEMENTS.map(a=>{const d=state.achievements.includes(a.id);
        return`<div style="display:flex;gap:6px;align-items:center;padding:3px 0;border-bottom:1px solid #f5f5f5">
          <div style="font-size:14px">${d?'✅':'🔒'}</div>
          <div><div style="font-weight:700;font-size:10.5px;color:${d?'var(--navy)':'#ccc'}">${a.name}</div>
          <div style="font-size:9px;color:#aaa">${a.desc} · +${a.pts}⭐</div></div></div>`;}).join('')}
    </div>`;
}

// ── CONFETTI ──────────────────────────────────────────────
function confetti(){
  const w=document.getElementById('confetti');
  const c=['#3d9e4a','#7ec84a','#1a2d4f','#ffd700','#ff6b6b','#4ecdc4'];
  for(let i=0;i<35;i++){
    const cf=document.createElement('div');cf.className='cf';
    cf.style.cssText=`left:${Math.random()*100}%;background:${c[Math.floor(Math.random()*c.length)]};animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*.4}s;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    w.appendChild(cf);setTimeout(()=>cf.remove(),2500);
  }
}

// ── MAIN INPUT ────────────────────────────────────────────
function q(text){msgUser(text);process(text);}
function send(){const i=document.getElementById('inp');const v=i.value.trim();if(!v)return;i.value='';msgUser(v);process(v);}

function process(text){
  if(state.waitingHeight){saveMeasure(text);return;}
  const t=text.toLowerCase();
  // Built-in commands first
  if(t.includes('/start')||t==='старт'){cmdStart();return;}
  if(t.includes('💧 полить')||t==='полить'||t==='полил'){cmdWater();return;}
  if(t.includes('📏 записать рост')||t==='записать рост'){cmdMeasure();return;}
  if(t.includes('📒 дневник')||t==='дневник'){cmdDiary();return;}
  if(t.includes('🏆 достижения')||t.includes('медал')){cmdAchievements();return;}
  if(t.includes('лидер')||t.includes('рейтинг')){switchTab('lb');return;}
  // Everything else → AI
  askAI(text);
}

function cmdStart(){
  msgBot(`👋 Привет! Я <b>Алем</b> — ИИ-помощник BALA LAB ✨<br><br>Я отвечу на <b>любые вопросы</b> о растениях, науке и микрозелени!<br><br>Сначала скажи как тебя зовут 👇`,false);
  setTimeout(()=>showNamePicker(()=>{
    setTimeout(()=>{
      msgBot(`Отлично, <b>${state.name}</b>! 🎉<br>Теперь выбери культуру для посева 🌱`,false);
      setTimeout(showPlantPicker,600);
    },200);
  }),700);
}

// ── INIT ──────────────────────────────────────────────────
updateStats();
setTimeout(()=>{
  if(state.name){
    msgBot(`С возвращением, <b>${state.name}</b>! 👋✨<br>Ты на месте #${getMyRank()} с ⭐${state.points} очков<br><br>Задай мне любой вопрос о растениях или нажми кнопки внизу 🌱`,true);
  } else {
    msgBot(`👋 Привет! Я <b>Алем ИИ</b> ✨<br>Умный помощник из набора <b>BALA LAB Microgreens</b>!<br><br>Я отвечу на <b>любой вопрос</b> о растениях 🌱<br>Напиши <b>/start</b> чтобы начать!`,true);
  }
},400);
</script>
